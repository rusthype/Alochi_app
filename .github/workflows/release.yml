name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.24.3'

jobs:
  # ─── Android ────────────────────────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --dart-define=API_URL=https://api.alochi.uz
      - name: Build AAB
        run: flutter build appbundle --release --dart-define=API_URL=https://api.alochi.uz
      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  # ─── iOS ────────────────────────────────────────────────────────────────────
  ios:
    name: iOS (IPA)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --dart-define=API_URL=https://api.alochi.uz
      - name: Archive IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r alochi.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-artifact
          path: build/ios/ipa/alochi.ipa

  # ─── macOS ──────────────────────────────────────────────────────────────────
  macos:
    name: macOS (DMG)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release --dart-define=API_URL=https://api.alochi.uz
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "A'lochi" \
            --window-size 800 400 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            alochi.dmg \
            "build/macos/Build/Products/Release/alochi.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: alochi.dmg

  # ─── Windows ────────────────────────────────────────────────────────────────
  windows:
    name: Windows (NSIS Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build Windows
        run: flutter build windows --release --dart-define=API_URL=https://api.alochi.uz
      - name: Build NSIS installer
        run: |
          choco install nsis -y
          makensis windows/installer.nsi
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: windows/alochi-setup.exe

  # ─── Linux ──────────────────────────────────────────────────────────────────
  linux:
    name: Linux (deb + AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release --dart-define=API_URL=https://api.alochi.uz
      - name: Package deb
        run: |
          mkdir -p alochi_1.0.0_amd64/DEBIAN
          mkdir -p alochi_1.0.0_amd64/usr/bin
          mkdir -p alochi_1.0.0_amd64/usr/share/applications
          cp -r build/linux/x64/release/bundle alochi_1.0.0_amd64/usr/lib/alochi
          echo '#!/bin/sh' > alochi_1.0.0_amd64/usr/bin/alochi
          echo 'exec /usr/lib/alochi/alochi "$@"' >> alochi_1.0.0_amd64/usr/bin/alochi
          chmod +x alochi_1.0.0_amd64/usr/bin/alochi
          cat > alochi_1.0.0_amd64/DEBIAN/control <<EOF
          Package: alochi
          Version: 1.0.0
          Section: education
          Priority: optional
          Architecture: amd64
          Maintainer: Alochi <info@alochi.uz>
          Description: A'lochi learning platform
          EOF
          dpkg-deb --build alochi_1.0.0_amd64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            alochi_1.0.0_amd64.deb

  # ─── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [android, ios, macos, windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "A'lochi ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/android-artifacts/app-release.apk
            artifacts/android-artifacts/app-release.aab
            artifacts/ios-artifact/alochi.ipa
            artifacts/macos-artifact/alochi.dmg
            artifacts/windows-artifact/alochi-setup.exe
            artifacts/linux-artifacts/alochi_1.0.0_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
