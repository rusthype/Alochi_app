name: A'lochi App Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  API_URL: https://api.alochi.uz

permissions:
  contents: write

jobs:

  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --dart-define=API_URL=${{ env.API_URL }}
      - run: flutter build appbundle --release --dart-define=API_URL=${{ env.API_URL }}
      - uses: actions/upload-artifact@v5
        with:
          name: android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  ios:
    name: iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Install CocoaPods
        run: sudo gem install cocoapods && cd ios && pod install --repo-update

      - name: Build iOS
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define=API_URL=https://api.alochi.uz
        continue-on-error: false

      - name: Zip iOS build
        run: |
          cd build/ios/iphoneos
          zip -r ../../../alochi-ios.zip .
        continue-on-error: true

      - uses: actions/upload-artifact@v5
        with:
          name: ios
          path: alochi-ios.zip
          if-no-files-found: warn

  macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release --dart-define=API_URL=${{ env.API_URL }}
      - run: cd build/macos/Build/Products/Release && zip -r ../../../../../alochi-macos.zip alochi_app.app
      - uses: actions/upload-artifact@v5
        with:
          name: macos
          path: alochi-macos.zip

  windows:
    name: Windows (NSIS Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release --dart-define=API_URL=${{ env.API_URL }}
      - name: Install NSIS
        run: choco install nsis -y
      - name: Build installer
        uses: joncloud/makensis-action@v4
        with:
          script-file: windows/installer.nsi
          arguments: /V3
      - name: Find and verify installer
        run: |
          Get-ChildItem -Recurse -Filter "*.exe" | Select-Object -ExpandProperty FullName
          if (Test-Path "AlochiApp-Setup.exe") {
            Write-Host "Found: AlochiApp-Setup.exe"
          } else {
            Write-Error "AlochiApp-Setup.exe not found in workspace root"
            exit 1
          }

      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: windows
          path: AlochiApp-Setup.exe
          if-no-files-found: error

  linux:
    name: Linux (deb + AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build \
            libgtk-3-dev liblzma-dev \
            libstdc++-12-dev \
            libglib2.0-dev libpango1.0-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release --dart-define=API_URL=${{ env.API_URL }}
      - name: Package Linux build
        run: |
          mkdir -p alochi-linux
          cp -r build/linux/x64/release/bundle/* alochi-linux/
          tar -czf alochi-linux.tar.gz alochi-linux/
      - uses: actions/upload-artifact@v5
        with:
          name: linux
          path: alochi-linux.tar.gz

  release:
    name: Create GitHub Release
    needs: [android, ios, macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "A'lochi ${{ github.ref_name }}"
          files: |
            app-release.apk
            app-release.aab
            alochi-ios.zip
            alochi-macos.zip
            AlochiApp-Setup.exe
            alochi-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
