name: A'lochi App Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:

  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../app/release.jks
          EOF

      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --dart-define=API_URL=https://api.alochi.org/api/v1

      - name: Build AAB
        run: |
          flutter build appbundle \
            --release \
            --dart-define=API_URL=https://api.alochi.org/api/v1

      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/bundle/release/app-release.aab

  release:
    name: Create GitHub Release
    needs: [android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: android-builds
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - uses: softprops/action-gh-release@v2
        with:
          name: "A'lochi ${{ github.ref_name }}"
          body: |
            ## A'lochi Teacher Mobile ${{ github.ref_name }}

            ### Nima yangi
            - 22 yangi ekran — Ustoz paneli to'liq
            - Pixel perfect UI — rasmiy mockup bo'yicha
            - Dars boshqaruvi (#27) — 4 bosqichli workflow
            - AI yordamchi + Telegram ota-onalar
            - WebSocket real-time chat
            - Offline banner

            ### O'rnatish
            - **Android (ARM64):** `app-arm64-v8a-release.apk` — zamonaviy qurilmalar
            - **Android (ARM32):** `app-armeabi-v7a-release.apk` — eski qurilmalar
            - **Play Console:** `app-release.aab` — to'liq bundle

            ### Texnik
            - flutter analyze: 0 issues
            - Min Android: API 26 (Android 8.0)
            - Version: ${{ github.ref_name }}
          files: |
            artifacts/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            artifacts/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            artifacts/build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
